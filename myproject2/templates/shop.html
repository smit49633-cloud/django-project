{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="http://fronts.googleapis.com">
    <link href="https://fronts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100">
    <style>
        *{
            font-family:"Roboto,sans-serif";
        }
        .main{
            display: flex;
            flex-wrap: wrap;
        }
        .product{
            background-color:bisque;
            border:1px solid black;
            margin:20px;
            padding:50px;
            width:210px;
            height: 350px;
            border-radius:20px
        }
        .product:hover{
            box-shadow:10px 10px 10px gray;
        }
        .btn{
            background-color:white;
            color:black;
            border-radius: 10px;
            width:210px;
            height: 25px;
            border: 1px solid blue;
        }
        .btn:hover{
            background-color: blue;
            color: white;
            border: 1px solid white;
        }
    </style>

</head>
<body>
    <h1>shop</h1>
    <div class="main">
        <div class="product">
            <img src="{% static 'tiger' %}" alt="tiger">
            <h3>tiger</h3>
            <p>Rs.150000</p>
            <input type="button" class="btn" value="Buy now"/>
        </div>
    
</body>
</html>
